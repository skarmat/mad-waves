name: Deploy to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish public/ to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          deploy_dir=".deploy-gh-pages"

          rm -rf "$deploy_dir"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add --force "$deploy_dir" origin/gh-pages
          else
            git worktree add --detach "$deploy_dir"
            (
              cd "$deploy_dir"
              git checkout --orphan gh-pages
              find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            )
          fi

          find "$deploy_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          cp -R public/. "$deploy_dir"/

          (
            cd "$deploy_dir"
            git add --all

            if git diff --cached --quiet; then
              echo "No changes to publish."
              exit 0
            fi

            git commit -m "Deploy from main"
            git push origin HEAD:gh-pages --force
          )

          git worktree remove "$deploy_dir" --force
